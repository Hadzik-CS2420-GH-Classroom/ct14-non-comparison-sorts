<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 628" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Bucket Sort &#x2014; Steps 1a, 1b (Distribution Phase)</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">NonComparisonSorts.cpp::bucket_sort() &#x2014; find range, compute buckets, distribute elements</text>

  <!-- Code block (left) -->
  <rect x="20" y="64" width="380" height="260" rx="8" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>

  <rect x="20" y="72" width="380" height="72" fill="#89b4fa18"/>
  <text x="35" y="88" fill="#89b4fa" font-size="11" font-weight="bold">Step 1a: Find range, compute buckets O(n)</text>
  <text x="35" y="106" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> min_val = *min_element(...);</text>
  <text x="35" y="122" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> max_val = *max_element(...);</text>
  <text x="35" y="138" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> range_per_bucket = ceil(range / num_buckets);</text>

  <!-- Edge case guards -->
  <rect x="20" y="146" width="380" height="40" fill="#f38ba820"/>
  <text x="35" y="162" fill="#f38ba8" font-size="11" font-weight="bold">Edge case guards:</text>
  <text x="35" y="178" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">if</tspan> (data.size() &lt;= <tspan fill="#fab387">1</tspan>) <tspan fill="#cba6f7">return</tspan>;</text>
  <text x="35" y="194" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">if</tspan> (min_val == max_val) <tspan fill="#cba6f7">return</tspan>; <tspan fill="#6c7086">// range=0</tspan></text>

  <rect x="20" y="202" width="380" height="60" fill="#a6e3a118"/>
  <text x="35" y="218" fill="#a6e3a1" font-size="11" font-weight="bold">Step 1b: Distribute into buckets O(n)</text>
  <text x="35" y="236" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">for</tspan> (<tspan fill="#cba6f7">int</tspan> val : data) {</text>
  <text x="50" y="254" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> idx = (val - min_val) / range_per_bucket;</text>
  <text x="50" y="270" fill="#cdd6f4" font-size="11">buckets[idx].push_back(val);</text>

  <text x="35" y="300" fill="#6c7086" font-size="11" font-style="italic">// num_buckets chosen by programmer (here: 3)</text>
  <text x="35" y="316" fill="#6c7086" font-size="11" font-style="italic">// Integer division maps value to bucket index</text>

  <!-- Right panel -->
  <text x="420" y="82" fill="#1565c0" font-size="13" font-weight="bold">Input: [42, 15, 73, 28, 91, 5]</text>

  <!-- Variable key -->
  <rect x="420" y="92" width="460" height="84" rx="6" fill="#f4f6f7" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="110" fill="#333" font-size="11" font-weight="bold">Variable Key</text>
  <text x="430" y="126" fill="#555" font-size="10"><tspan font-weight="bold" fill="#0d47a1">min_val</tspan> = smallest element (5) &#xA0;&#xA0;&#xA0; <tspan font-weight="bold" fill="#0d47a1">max_val</tspan> = largest element (91)</text>
  <text x="430" y="142" fill="#555" font-size="10"><tspan font-weight="bold" fill="#0d47a1">num_buckets</tspan> = how many buckets (3) &#x2014; <tspan font-weight="bold">chosen by programmer</tspan>, not computed. Common: n, sqrt(n), or fixed.</text>
  <text x="430" y="158" fill="#555" font-size="10"><tspan font-weight="bold" fill="#0d47a1">range_per_bucket</tspan> = ceil(range / num_buckets) &#x2014; how wide each bucket's value range is</text>
  <text x="430" y="170" fill="#555" font-size="10"><tspan font-weight="bold" fill="#0d47a1">bucket_idx</tspan> = (value - min_val) / range_per_bucket &#x2014; which bucket a value goes into (integer division)</text>

  <!-- 1a result -->
  <rect x="420" y="182" width="460" height="36" rx="6" fill="#eaf4fb" stroke="#5dade2" stroke-width="1"/>
  <text x="430" y="200" fill="#2980b9" font-size="11" font-weight="bold">1a: range_per_bucket = ceil((91-5+1) / 3) = ceil(87/3) = <tspan fill="#c62828">29</tspan></text>
  <text x="760" y="200" fill="#888" font-size="10">[5-33] [34-62] [63-91]</text>

  <!-- Edge cases -->
  <rect x="420" y="228" width="460" height="56" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="430" y="246" fill="#c62828" font-size="11" font-weight="bold">Edge cases (checked before distribution):</text>
  <text x="430" y="262" fill="#555" font-size="10">&#x2022; size &lt;= 1: nothing to sort, return early</text>
  <text x="430" y="276" fill="#555" font-size="10">&#x2022; min == max: all values identical, range = 0 &#x2192; divide-by-zero in bucket formula. Return early.</text>

  <!-- 1b distribution table -->
  <rect x="420" y="292" width="460" height="210" rx="6" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
  <text x="430" y="312" fill="#e67e22" font-size="12" font-weight="bold">1b: Distribute each element</text>

  <!-- Column headers -->
  <text x="430" y="332" fill="#555" font-size="10" font-weight="bold">Element</text>
  <text x="500" y="332" fill="#555" font-size="10" font-weight="bold">(val - min) / range_per_bucket</text>
  <text x="730" y="332" fill="#555" font-size="10" font-weight="bold">Bucket</text>

  <text x="430" y="352" fill="#1565c0" font-size="11" font-weight="bold">42</text>
  <text x="500" y="352" fill="#555" font-size="11">(42 - 5) / 29 = 37 / 29 = <tspan fill="#e65100" font-weight="bold">1</tspan></text>
  <text x="730" y="352" fill="#e65100" font-size="11">B1 (34-62)</text>

  <text x="430" y="372" fill="#1565c0" font-size="11" font-weight="bold">15</text>
  <text x="500" y="372" fill="#555" font-size="11">(15 - 5) / 29 = 10 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="730" y="372" fill="#e65100" font-size="11">B0 (5-33)</text>

  <text x="430" y="392" fill="#1565c0" font-size="11" font-weight="bold">73</text>
  <text x="500" y="392" fill="#555" font-size="11">(73 - 5) / 29 = 68 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="730" y="392" fill="#e65100" font-size="11">B2 (63-91)</text>

  <text x="430" y="412" fill="#1565c0" font-size="11" font-weight="bold">28</text>
  <text x="500" y="412" fill="#555" font-size="11">(28 - 5) / 29 = 23 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="730" y="412" fill="#e65100" font-size="11">B0</text>

  <text x="430" y="432" fill="#1565c0" font-size="11" font-weight="bold">91</text>
  <text x="500" y="432" fill="#555" font-size="11">(91 - 5) / 29 = 86 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="730" y="432" fill="#e65100" font-size="11">B2</text>

  <text x="430" y="452" fill="#1565c0" font-size="11" font-weight="bold">5</text>
  <text x="500" y="452" fill="#555" font-size="11">(5 - 5) / 29 = 0 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="730" y="452" fill="#e65100" font-size="11">B0</text>

  <!-- Bucket state -->
  <text x="430" y="488" fill="#1565c0" font-size="11" font-weight="bold">B0: [15, 28, 5]</text>
  <text x="600" y="488" fill="#1565c0" font-size="11" font-weight="bold">B1: [42]</text>
  <text x="720" y="488" fill="#1565c0" font-size="11" font-weight="bold">B2: [73, 91]</text>

  <!-- Key insight -->
  <rect x="20" y="518" width="860" height="50" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="548" text-anchor="middle" fill="#333" font-size="12">After distribution: each bucket contains elements within its value range. Buckets are <tspan font-weight="bold">unsorted internally</tspan>.</text>

  <rect x="20" y="582" width="860" height="36" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="450" y="606" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">&#x2192; Continues in: Bucket Sort Steps 2-3 (Sort + Concatenate)</text>
</svg>
