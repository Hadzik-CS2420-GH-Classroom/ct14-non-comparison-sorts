<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Radix Sort (LSD) &#x2014; Code Walkthrough</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">BucketSorts.cpp::radix_sort() &#x2014; d passes of stable counting sort, one per digit</text>

  <!-- Code block (left) -->
  <rect x="20" y="64" width="420" height="340" rx="8" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>

  <!-- Step 0 highlight -->
  <rect x="20" y="72" width="420" height="42" fill="#89b4fa18"/>
  <text x="35" y="88" fill="#89b4fa" font-size="11" font-weight="bold">Step 0: Find max, determine d O(n)</text>
  <text x="35" y="106" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> max_val = *max_element(...);</text>

  <!-- Main loop highlight -->
  <rect x="20" y="120" width="420" height="42" fill="#a6e3a118"/>
  <text x="35" y="136" fill="#a6e3a1" font-size="11" font-weight="bold">Main loop: one pass per digit position</text>
  <text x="35" y="154" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">for</tspan> (<tspan fill="#cba6f7">int</tspan> exp = <tspan fill="#fab387">1</tspan>; max_val / exp &gt; <tspan fill="#fab387">0</tspan>; exp *= <tspan fill="#fab387">10</tspan>)</text>

  <!-- Helper highlight -->
  <rect x="20" y="168" width="420" height="170" fill="#f38ba818"/>
  <text x="35" y="184" fill="#f38ba8" font-size="11" font-weight="bold">counting_sort_by_digit(data, exp):</text>
  <text x="35" y="204" fill="#6c7086" font-size="11" font-style="italic">// k = 10 (digits 0-9)</text>
  <text x="35" y="222" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> digit = (data[i] / exp) % <tspan fill="#fab387">10</tspan>;</text>
  <text x="35" y="240" fill="#cdd6f4" font-size="11">count[digit]++;</text>
  <text x="35" y="264" fill="#6c7086" font-size="11" font-style="italic">// Convert to cumulative (for stability)</text>
  <text x="35" y="282" fill="#cdd6f4" font-size="11">count[i] += count[i - <tspan fill="#fab387">1</tspan>];</text>
  <text x="35" y="306" fill="#6c7086" font-size="11" font-style="italic">// Build output (iterate backwards for stability)</text>
  <text x="35" y="324" fill="#cdd6f4" font-size="11">output[count[digit] - <tspan fill="#fab387">1</tspan>] = data[i];</text>
  <text x="35" y="342" fill="#cdd6f4" font-size="11">count[digit]--;</text>

  <text x="35" y="376" fill="#6c7086" font-size="11" font-style="italic">// d = digits in max. k = 10 (base).</text>
  <text x="35" y="392" fill="#6c7086" font-size="11" font-style="italic">// Total: O(d * (n + 10)). Stable: Yes.</text>

  <!-- Visual (right) -->
  <text x="460" y="82" fill="#6a1b9a" font-size="13" font-weight="bold">Input: [170, 45, 75, 90, 802, 24, 2, 66]</text>

  <rect x="460" y="96" width="410" height="36" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="470" y="114" fill="#6a1b9a" font-size="11" font-weight="bold">Step 0: max=802, d=3 digits, k=10 (base 10)</text>
  <text x="470" y="128" fill="#6a1b9a" font-size="10">3 passes: ones (exp=1), tens (exp=10), hundreds (exp=100)</text>

  <rect x="460" y="140" width="410" height="58" rx="6" fill="#ede7f6" stroke="#9b59b6" stroke-width="1"/>
  <text x="470" y="158" fill="#6a1b9a" font-size="11" font-weight="bold">Pass 1 (ones): digit = value % 10</text>
  <text x="470" y="176" fill="#555" font-size="10">170&#x2192;0 45&#x2192;5 75&#x2192;5 90&#x2192;0 802&#x2192;2 24&#x2192;4 2&#x2192;2 66&#x2192;6</text>
  <text x="470" y="192" fill="#888" font-size="10">Result: [170, 90, 802, 2, 24, 45, 75, 66]</text>

  <rect x="460" y="206" width="410" height="58" rx="6" fill="#ede7f6" stroke="#8e44ad" stroke-width="1"/>
  <text x="470" y="224" fill="#8e44ad" font-size="11" font-weight="bold">Pass 2 (tens): digit = (value / 10) % 10</text>
  <text x="470" y="242" fill="#555" font-size="10">170&#x2192;7 90&#x2192;9 802&#x2192;0 2&#x2192;0 24&#x2192;2 45&#x2192;4 75&#x2192;7 66&#x2192;6</text>
  <text x="470" y="258" fill="#888" font-size="10">Result: [802, 2, 24, 45, 66, 170, 75, 90]</text>

  <rect x="460" y="272" width="410" height="58" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="1"/>
  <text x="470" y="290" fill="#1b5e20" font-size="11" font-weight="bold">Pass 3 (hundreds): digit = (value / 100) % 10</text>
  <text x="470" y="308" fill="#555" font-size="10">802&#x2192;8 2&#x2192;0 24&#x2192;0 45&#x2192;0 66&#x2192;0 170&#x2192;1 75&#x2192;0 90&#x2192;0</text>
  <rect x="470" y="314" width="34" height="18" rx="3" fill="#27ae60"/><text x="487" y="328" text-anchor="middle" fill="#fff" font-size="9">2</text>
  <rect x="507" y="314" width="34" height="18" rx="3" fill="#27ae60"/><text x="524" y="328" text-anchor="middle" fill="#fff" font-size="9">24</text>
  <rect x="544" y="314" width="34" height="18" rx="3" fill="#27ae60"/><text x="561" y="328" text-anchor="middle" fill="#fff" font-size="9">45</text>
  <rect x="581" y="314" width="34" height="18" rx="3" fill="#27ae60"/><text x="598" y="328" text-anchor="middle" fill="#fff" font-size="9">66</text>
  <rect x="618" y="314" width="34" height="18" rx="3" fill="#27ae60"/><text x="635" y="328" text-anchor="middle" fill="#fff" font-size="9">75</text>
  <rect x="655" y="314" width="34" height="18" rx="3" fill="#27ae60"/><text x="672" y="328" text-anchor="middle" fill="#fff" font-size="9">90</text>
  <rect x="692" y="314" width="38" height="18" rx="3" fill="#27ae60"/><text x="711" y="328" text-anchor="middle" fill="#fff" font-size="9">170</text>
  <rect x="733" y="314" width="38" height="18" rx="3" fill="#27ae60"/><text x="752" y="328" text-anchor="middle" fill="#fff" font-size="9">802</text>

  <!-- Key insight -->
  <rect x="20" y="420" width="860" height="66" rx="10" fill="#f4ecf7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="40" y="444" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Stability is critical:</tspan> iterating backwards in the placement step preserves the ordering from previous digit passes.</text>
  <text x="40" y="466" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">k is always 10</tspan> (base 10 digits), so O(n + k) per pass is essentially O(n). Total: O(d * n) where d = digits in max.</text>
</svg>
