<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 920" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Bucket Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Distribute into range-based buckets, sort each bucket, concatenate.</text>

  <!-- Legend -->
  <rect x="660" y="64" width="220" height="48" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="680" y="82" fill="#333" font-size="11" font-weight="bold">Time: O(n+k) avg</text>
  <text x="680" y="100" fill="#333" font-size="11" font-weight="bold">Space: O(n+k)</text>
  <text x="800" y="82" fill="#e74c3c" font-size="11" font-weight="bold">Worst: O(n&#xB2;)</text>
  <text x="800" y="100" fill="#888" font-size="11">(all in 1 bucket)</text>

  <!-- Input -->
  <text x="30" y="90" fill="#1a1a1a" font-size="15" font-weight="bold">Input:</text>
  <rect x="100" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="121" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">42</text>
  <rect x="148" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="169" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">15</text>
  <rect x="196" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="217" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">73</text>
  <rect x="244" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="265" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">28</text>
  <rect x="292" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="313" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">91</text>
  <rect x="340" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="361" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>

  <!-- ===== STEP 1a: Find min, max, choose bucket count ===== -->
  <rect x="20" y="118" width="860" height="70" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="35" y="140" fill="#1565c0" font-size="14" font-weight="bold">Step 1a: Find min, max, and choose bucket count</text>
  <text x="400" y="140" fill="#888" font-size="11">Scan all n elements once: O(n)</text>

  <text x="35" y="160" fill="#555" font-size="12">Scan: 42, 15, 73, 28, 91, 5</text>
  <rect x="310" y="146" width="540" height="28" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="320" y="165" fill="#0d47a1" font-size="12">min=<tspan font-weight="bold">5</tspan>, max=<tspan font-weight="bold">91</tspan>, num_buckets=<tspan font-weight="bold">3</tspan>, range_per_bucket = ceil((91-5+1)/3) = <tspan font-weight="bold" fill="#c62828">29</tspan></text>
  <text x="35" y="180" fill="#8e44ad" font-size="11" font-weight="bold">Bucket ranges: [5-33], [34-62], [63-91]</text>

  <!-- ===== STEP 1b: Distribute element by element ===== -->
  <rect x="20" y="198" width="860" height="200" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="35" y="220" fill="#e65100" font-size="14" font-weight="bold">Step 1b: Distribute into buckets</text>
  <text x="280" y="220" fill="#888" font-size="11">For each element: bucket_index = (value - min) / range_per_bucket. O(n)</text>

  <!-- Column headers -->
  <text x="40"  y="242" fill="#555" font-size="10" font-weight="bold">Element</text>
  <text x="120" y="242" fill="#555" font-size="10" font-weight="bold">Formula</text>
  <text x="370" y="242" fill="#555" font-size="10" font-weight="bold">Result</text>
  <text x="530" y="242" fill="#555" font-size="10" font-weight="bold">Bucket</text>

  <!-- Row 1: 42 -->
  <text x="40"  y="262" fill="#1565c0" font-size="12" font-weight="bold">42</text>
  <text x="120" y="262" fill="#555" font-size="12">(42 - 5) / 29 = 37 / 29 = <tspan fill="#e65100" font-weight="bold">1</tspan></text>
  <text x="370" y="262" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">1</tspan> (34-62)</text>
  <text x="530" y="262" fill="#888" font-size="11">B0: [] B1: [42] B2: []</text>

  <!-- Row 2: 15 -->
  <text x="40"  y="284" fill="#1565c0" font-size="12" font-weight="bold">15</text>
  <text x="120" y="284" fill="#555" font-size="12">(15 - 5) / 29 = 10 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="370" y="284" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">0</tspan> (5-33)</text>
  <text x="530" y="284" fill="#888" font-size="11">B0: [15] B1: [42] B2: []</text>

  <!-- Row 3: 73 -->
  <text x="40"  y="306" fill="#1565c0" font-size="12" font-weight="bold">73</text>
  <text x="120" y="306" fill="#555" font-size="12">(73 - 5) / 29 = 68 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="370" y="306" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">2</tspan> (63-91)</text>
  <text x="530" y="306" fill="#888" font-size="11">B0: [15] B1: [42] B2: [73]</text>

  <!-- Row 4: 28 -->
  <text x="40"  y="328" fill="#1565c0" font-size="12" font-weight="bold">28</text>
  <text x="120" y="328" fill="#555" font-size="12">(28 - 5) / 29 = 23 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="370" y="328" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">0</tspan> (5-33)</text>
  <text x="530" y="328" fill="#888" font-size="11">B0: [15, 28] B1: [42] B2: [73]</text>

  <!-- Row 5: 91 -->
  <text x="40"  y="350" fill="#1565c0" font-size="12" font-weight="bold">91</text>
  <text x="120" y="350" fill="#555" font-size="12">(91 - 5) / 29 = 86 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="370" y="350" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">2</tspan> (63-91)</text>
  <text x="530" y="350" fill="#888" font-size="11">B0: [15, 28] B1: [42] B2: [73, 91]</text>

  <!-- Row 6: 5 -->
  <text x="40"  y="372" fill="#1565c0" font-size="12" font-weight="bold">5</text>
  <text x="120" y="372" fill="#555" font-size="12">(5 - 5) / 29 = 0 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="370" y="372" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">0</tspan> (5-33)</text>
  <text x="530" y="372" fill="#888" font-size="11">B0: [15, 28, 5] B1: [42] B2: [73, 91]</text>

  <!-- Visual: filled buckets -->
  <text x="35" y="394" fill="#1565c0" font-size="11" font-weight="bold">After distribution:</text>

  <rect x="40" y="400" width="250" height="46" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="50" y="416" fill="#1565c0" font-size="11" font-weight="bold">Bucket 0 (5-33):</text>
  <rect x="160" y="408" width="34" height="24" rx="4" fill="#1565c0"/><text x="177" y="425" text-anchor="middle" fill="#fff" font-size="11">15</text>
  <rect x="198" y="408" width="34" height="24" rx="4" fill="#1565c0"/><text x="215" y="425" text-anchor="middle" fill="#fff" font-size="11">28</text>
  <rect x="236" y="408" width="34" height="24" rx="4" fill="#1565c0"/><text x="253" y="425" text-anchor="middle" fill="#fff" font-size="11">5</text>

  <rect x="320" y="400" width="250" height="46" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="330" y="416" fill="#1565c0" font-size="11" font-weight="bold">Bucket 1 (34-62):</text>
  <rect x="455" y="408" width="34" height="24" rx="4" fill="#1565c0"/><text x="472" y="425" text-anchor="middle" fill="#fff" font-size="11">42</text>

  <rect x="600" y="400" width="250" height="46" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="610" y="416" fill="#1565c0" font-size="11" font-weight="bold">Bucket 2 (63-91):</text>
  <rect x="740" y="408" width="34" height="24" rx="4" fill="#1565c0"/><text x="757" y="425" text-anchor="middle" fill="#fff" font-size="11">73</text>
  <rect x="778" y="408" width="34" height="24" rx="4" fill="#1565c0"/><text x="795" y="425" text-anchor="middle" fill="#fff" font-size="11">91</text>

  <!-- ===== STEP 2: Sort each bucket ===== -->
  <rect x="20" y="460" width="860" height="100" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="35" y="482" fill="#e65100" font-size="14" font-weight="bold">Step 2: Sort each bucket</text>
  <text x="260" y="482" fill="#888" font-size="11">Use insertion sort on each bucket. Buckets are small, so O(n&#xB2;) per bucket is fine.</text>

  <rect x="40" y="496" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="50" y="512" fill="#e65100" font-size="11" font-weight="bold">Bucket 0 sorted:</text>
  <rect x="160" y="504" width="34" height="24" rx="4" fill="#e65100"/><text x="177" y="521" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <rect x="198" y="504" width="34" height="24" rx="4" fill="#e65100"/><text x="215" y="521" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">15</text>
  <rect x="236" y="504" width="34" height="24" rx="4" fill="#e65100"/><text x="253" y="521" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">28</text>

  <rect x="320" y="496" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="330" y="512" fill="#e65100" font-size="11" font-weight="bold">Bucket 1 sorted:</text>
  <rect x="455" y="504" width="34" height="24" rx="4" fill="#e65100"/><text x="472" y="521" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">42</text>

  <rect x="600" y="496" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="610" y="512" fill="#e65100" font-size="11" font-weight="bold">Bucket 2 sorted:</text>
  <rect x="740" y="504" width="34" height="24" rx="4" fill="#e65100"/><text x="757" y="521" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">73</text>
  <rect x="778" y="504" width="34" height="24" rx="4" fill="#e65100"/><text x="795" y="521" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">91</text>

  <!-- ===== STEP 3: Concatenate ===== -->
  <rect x="20" y="574" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="35" y="596" fill="#27ae60" font-size="14" font-weight="bold">Step 3: Concatenate all buckets</text>
  <text x="310" y="596" fill="#888" font-size="11">Append Bucket 0 + Bucket 1 + Bucket 2 into output. O(n)</text>
  <rect x="100" y="604" width="42" height="28" rx="4" fill="#27ae60"/><text x="121" y="623" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="148" y="604" width="42" height="28" rx="4" fill="#27ae60"/><text x="169" y="623" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">15</text>
  <rect x="196" y="604" width="42" height="28" rx="4" fill="#27ae60"/><text x="217" y="623" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">28</text>
  <rect x="244" y="604" width="42" height="28" rx="4" fill="#27ae60"/><text x="265" y="623" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">42</text>
  <rect x="292" y="604" width="42" height="28" rx="4" fill="#27ae60"/><text x="313" y="623" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">73</text>
  <rect x="340" y="604" width="42" height="28" rx="4" fill="#27ae60"/><text x="361" y="623" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">91</text>
  <text x="400" y="623" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; sorted!</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="660" width="860" height="244" rx="10" fill="#f4ecf7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="450" y="686" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">Key Takeaways</text>
  <text x="40" y="712" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Three steps:</tspan> (1a) find range + choose buckets O(n), (1b) distribute O(n), (2) sort each bucket, (3) concatenate O(n).</text>
  <text x="40" y="736" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Total: O(n + k)</tspan> average when data distributes evenly. k = number of buckets.</text>
  <text x="40" y="760" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold" fill="#e74c3c">Worst case O(n&#xB2;):</tspan> if all elements land in one bucket, you end up running insertion sort on the whole array.</text>
  <text x="40" y="784" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Why insertion sort?</tspan> Buckets are small (2-3 elements each). Insertion sort is O(n&#xB2;) but on tiny arrays that is just a few operations.</text>
  <text x="40" y="808" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Bucket index formula:</tspan> (value - min) / range_per_bucket. Integer division gives the bucket number directly.</text>
  <text x="40" y="832" fill="#333" font-size="12">&#x2022; Works best when data is <tspan font-weight="bold">uniformly distributed</tspan> across a known range. Clustered data fills one bucket and degrades to O(n&#xB2;).</text>
  <text x="40" y="856" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Stable</tspan> if the per-bucket sort is stable (insertion sort is stable).</text>
  <text x="40" y="880" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">vs counting sort:</tspan> counting sort needs k = value range (can be huge). Bucket sort only needs k = number of buckets (you choose).</text>
</svg>
