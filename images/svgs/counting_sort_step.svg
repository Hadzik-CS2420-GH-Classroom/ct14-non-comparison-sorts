<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Counting Sort &#x2014; How the Count Array Works</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">BucketSorts.cpp::counting_sort() &#x2014; two passes: count, then place</text>

  <!-- Code block on left -->
  <rect x="20" y="64" width="380" height="195" rx="8" fill="#1e1e2e"/>
  <text x="35" y="86" fill="#6c7086" font-size="11" font-style="italic">// Pass 1: Count occurrences</text>
  <text x="35" y="104" fill="#cba6f7" font-size="11">for</text><text x="55" y="104" fill="#cdd6f4" font-size="11"> (</text><text x="63" y="104" fill="#cba6f7" font-size="11">int</text><text x="83" y="104" fill="#cdd6f4" font-size="11"> val : data)</text>
  <text x="50" y="122" fill="#cdd6f4" font-size="11">count[val - min_val]++;</text>
  <text x="35" y="148" fill="#6c7086" font-size="11" font-style="italic">// Pass 2: Place elements</text>
  <text x="35" y="166" fill="#cba6f7" font-size="11">int</text><text x="55" y="166" fill="#cdd6f4" font-size="11"> idx = </text><text x="95" y="166" fill="#fab387" font-size="11">0</text><text x="103" y="166" fill="#cdd6f4" font-size="11">;</text>
  <text x="35" y="184" fill="#cba6f7" font-size="11">for</text><text x="55" y="184" fill="#cdd6f4" font-size="11"> (</text><text x="63" y="184" fill="#cba6f7" font-size="11">int</text><text x="83" y="184" fill="#cdd6f4" font-size="11"> i = </text><text x="107" y="184" fill="#fab387" font-size="11">0</text><text x="115" y="184" fill="#cdd6f4" font-size="11">; i &lt; range; ++i)</text>
  <text x="50" y="202" fill="#cba6f7" font-size="11">while</text><text x="82" y="202" fill="#cdd6f4" font-size="11"> (count[i]-- &gt; </text><text x="175" y="202" fill="#fab387" font-size="11">0</text><text x="183" y="202" fill="#cdd6f4" font-size="11">)</text>
  <text x="65" y="220" fill="#cdd6f4" font-size="11">data[idx++] = i + min_val;</text>
  <text x="35" y="245" fill="#6c7086" font-size="11" font-style="italic">// No comparisons! Just count and place.</text>

  <!-- Visual on right -->
  <text x="430" y="82" fill="#2e7d32" font-size="13" font-weight="bold">Input: [4, 2, 7, 1, 4, 2]</text>

  <!-- Pass 1 arrow -->
  <text x="430" y="108" fill="#e65100" font-size="12" font-weight="bold">Pass 1: Tally each value</text>
  <text x="430" y="128" fill="#555" font-size="11">4&#x2192;count[3]++ &#xA0; 2&#x2192;count[1]++ &#xA0; 7&#x2192;count[6]++</text>
  <text x="430" y="146" fill="#555" font-size="11">1&#x2192;count[0]++ &#xA0; 4&#x2192;count[3]++ &#xA0; 2&#x2192;count[1]++</text>

  <!-- Count array -->
  <text x="430" y="176" fill="#555" font-size="11">index:  0  1  2  3  4  5  6</text>
  <text x="430" y="192" fill="#555" font-size="11">value:  1  2  3  4  5  6  7</text>
  <!-- Count boxes -->
  <rect x="430" y="198" width="30" height="24" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="445" y="215" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">1</text>
  <rect x="466" y="198" width="30" height="24" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="481" y="215" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">2</text>
  <rect x="502" y="198" width="30" height="24" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="517" y="215" text-anchor="middle" fill="#999" font-size="12">0</text>
  <rect x="538" y="198" width="30" height="24" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="553" y="215" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">2</text>
  <rect x="574" y="198" width="30" height="24" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="589" y="215" text-anchor="middle" fill="#999" font-size="12">0</text>
  <rect x="610" y="198" width="30" height="24" rx="3" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="625" y="215" text-anchor="middle" fill="#999" font-size="12">0</text>
  <rect x="646" y="198" width="30" height="24" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="661" y="215" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">1</text>

  <!-- Pass 2 -->
  <text x="430" y="250" fill="#1565c0" font-size="12" font-weight="bold">Pass 2: Read counts left-to-right, place values</text>
  <text x="430" y="270" fill="#555" font-size="11">count[0]=1 &#x2192; write 1 &#xA0;&#xA0; count[1]=2 &#x2192; write 2,2 &#xA0;&#xA0; count[3]=2 &#x2192; write 4,4 &#xA0;&#xA0; count[6]=1 &#x2192; write 7</text>

  <!-- Output -->
  <rect x="430" y="284" width="38" height="24" rx="4" fill="#27ae60"/><text x="449" y="301" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <rect x="474" y="284" width="38" height="24" rx="4" fill="#27ae60"/><text x="493" y="301" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <rect x="518" y="284" width="38" height="24" rx="4" fill="#27ae60"/><text x="537" y="301" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <rect x="562" y="284" width="38" height="24" rx="4" fill="#27ae60"/><text x="581" y="301" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <rect x="606" y="284" width="38" height="24" rx="4" fill="#27ae60"/><text x="625" y="301" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <rect x="650" y="284" width="38" height="24" rx="4" fill="#27ae60"/><text x="669" y="301" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">7</text>

  <!-- Key insight -->
  <rect x="20" y="340" width="860" height="66" rx="10" fill="#f4ecf7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="40" y="364" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Two O(n) passes</tspan> + one O(k) count array = O(n + k) total. No nested loops, no comparisons.</text>
  <text x="40" y="386" fill="#333" font-size="12">&#x2022; The count array acts as a <tspan font-weight="bold">frequency table</tspan> &#x2014; it tells you exactly how many of each value to write and in what order.</text>
</svg>
